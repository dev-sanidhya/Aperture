services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: aperture
      POSTGRES_PASSWORD: aperture
      POSTGRES_DB: aperture
    ports:
      - "${APERTURE_LOCAL_POSTGRES_PORT:-5433}:5432"
    volumes:
      - aperture-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${APERTURE_LOCAL_REDIS_PORT:-6380}:6379"
    volumes:
      - aperture-redis:/data

volumes:
  aperture-postgres:
  aperture-redis:

