<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ap-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="50%" stop-color="#5ee7df"/>
      <stop offset="100%" stop-color="#8b6dff"/>
    </linearGradient>
    <radialGradient id="ap-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0b1a"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <filter id="ap-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- disc -->
  <circle cx="32" cy="32" r="30" fill="url(#ap-bg)"/>
  <circle cx="32" cy="32" r="29.2" fill="none" stroke="url(#ap-g)" stroke-width="1.1" opacity="0.95"/>

  <!-- 6 iris blade lines (clockwise swirl from hex corners to outer ring) -->
  <g stroke="url(#ap-g)" stroke-width="1.4" stroke-linecap="round" filter="url(#ap-glow)">
    <line x1="44" y1="32"    x2="56.25" y2="46"/>
    <line x1="38" y1="42.39" x2="32"    y2="60"/>
    <line x1="26" y1="42.39" x2="7.75"  y2="46"/>
    <line x1="20" y1="32"    x2="7.75"  y2="18"/>
    <line x1="26" y1="21.61" x2="32"    y2="4"/>
    <line x1="38" y1="21.61" x2="56.25" y2="18"/>
  </g>

  <!-- inner hex aperture opening -->
  <polygon
    points="44,32 38,42.39 26,42.39 20,32 26,21.61 38,21.61"
    fill="none"
    stroke="url(#ap-g)"
    stroke-width="1.6"
    stroke-linejoin="round"/>

  <!-- tiny center dot -->
  <circle cx="32" cy="32" r="1.6" fill="url(#ap-g)"/>
</svg>
